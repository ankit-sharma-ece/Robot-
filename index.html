<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Infinite Escape Pro</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#1e3c72, #2a5298);
  font-family: Arial;
}

canvas { display: block; }

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  padding: 10px 15px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

#controls {
  position: absolute;
  bottom: 20px;
  left: 20px;
}

.btn {
  width: 60px;
  height: 60px;
  margin: 5px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 20px;
}

#jumpBtn {
  position: absolute;
  right: 20px;
  bottom: 20px;
}
</style>
</head>

<body>

<div id="ui">
  Score: <span id="score">0</span> |
  Keys: <span id="keys">0</span>
</div>

<div id="controls">
  <button class="btn" ontouchstart="moveLeft(true)" ontouchend="moveLeft(false)">←</button>
  <button class="btn" ontouchstart="moveRight(true)" ontouchend="moveRight(false)">→</button>
</div>

<button id="jumpBtn" class="btn"
 ontouchstart="jump()">⤴</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// PLAYER
let player = {
  x: 100, y: 300,
  w: 40, h: 40,
  dy: 0,
  gravity: 0.8,
  jump: -15,
  jumps: 0,
  keys: 0
};

// INPUT
let left = false, right = false;

// WORLD
let platforms = [];
let keysArr = [];
let gates = [];
let speed = 5;
let score = 0;

// CREATE WORLD
function createPlatform(x) {
  let y = Math.random()*200 + 250;

  platforms.push({x,y,w:200,h:20});

  if(Math.random() > 0.6){
    keysArr.push({x:x+80, y:y-40});
  }

  if(Math.random() > 0.75){
    gates.push({x:x+120, y:y-40, locked:true});
  }
}

for(let i=0;i<10;i++) createPlatform(i*200);

// CONTROLS
function moveLeft(v){ left = v; }
function moveRight(v){ right = v; }

function jump(){
  if(player.jumps < 2){
    player.dy = player.jump;
    player.jumps++;
  }
}

// LOOP
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // MOVE
  if(left) player.x -= 5;
  if(right) player.x += 5;

  player.dy += player.gravity;
  player.y += player.dy;

  let grounded = false;

  // PLATFORMS
  platforms.forEach(p=>{
    p.x -= speed;

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(p.x,p.y,p.w,p.h);

    if(player.x < p.x+p.w &&
       player.x+player.w > p.x &&
       player.y < p.y+p.h &&
       player.y+player.h > p.y){

       player.y = p.y-player.h;
       player.dy = 0;
       grounded = true;
       player.jumps = 0;
    }
  });

  // KEYS
  keysArr.forEach((k,i)=>{
    k.x -= speed;
    ctx.fillStyle="yellow";
    ctx.fillRect(k.x,k.y,15,15);

    if(player.x < k.x+15 &&
       player.x+player.w > k.x &&
       player.y < k.y+15 &&
       player.y+player.h > k.y){
         player.keys++;
         keysArr.splice(i,1);
       }
  });

  // GATES (PUZZLE)
  gates.forEach(g=>{
    g.x -= speed;

    ctx.fillStyle = g.locked ? "red":"green";
    ctx.fillRect(g.x,g.y,20,40);

    if(player.x < g.x+20 &&
       player.x+player.w > g.x &&
       player.y < g.y+40 &&
       player.y+player.h > g.y){

       if(g.locked && player.keys>0){
         g.locked=false;
         player.keys--;
       } else if(g.locked){
         gameOver();
       }
    }
  });

  // PLAYER
  ctx.fillStyle="white";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // NEW PLATFORM
  if(platforms[platforms.length-1].x < canvas.width){
    createPlatform(platforms.length*200);
  }

  score++;
  document.getElementById("score").innerText = score;
  document.getElementById("keys").innerText = player.keys;

  requestAnimationFrame(update);
}

// GAME OVER
function gameOver(){
  alert("Game Over 😵 Score: "+score);
  location.reload();
}

update();
</script>

</body>
</html>
